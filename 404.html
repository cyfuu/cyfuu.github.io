<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      const currentPath = window.location.pathname;
      const isIndex = currentPath === "/" || currentPath === "/index.html";

      if (!isIndex) {
        window.location.href = `/#${currentPath}`;
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
