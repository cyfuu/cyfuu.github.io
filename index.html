    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            });
          var newUrl =
            l.pathname.slice(0, -1) +
            decoded[0] +
            (decoded.slice(1).length > 0
              ? "?" + decoded.slice(1).join("&")
              : "") +
            l.hash;
          window.history.replaceState(null, null, newUrl);
        }
      })(window.location);
    </script>
